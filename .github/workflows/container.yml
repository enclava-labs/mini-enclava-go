name: Publish Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve git metadata
        id: gitmeta
        run: |
          echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.gitmeta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Write image artifact
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p dist
          printf '{"image":"%s","digest":"%s","ref":"%s@%s"}\n' "$IMAGE" "$DIGEST" "$IMAGE" "$DIGEST" > dist/enclava-image.json

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: enclava-image
          path: dist/enclava-image.json
